[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    smoke: 冒烟测试
    auth: 认证相关
    user: 用户管理
    asset: 资产管理
    budget: 预算管理
    document: 公文管理
    message: 消息管理
    org: 组织管理
    permission: 权限测试
    integration: 集成测试